<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hóa Đơn Thanh Toán</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>

    <div class="invoice">
        <h2>HÓA ĐƠN THANH TOÁN</h2>

        <table>
            <tr>
                <th>Sản phẩm</th>
                <th>Đơn giá</th>
                <th>Số lượng</th>
                <th>Thành tiền</th>
            </tr>

            <tr>
                <td>Bánh</td>
                <td class="gia">10000</td>
                <td><input type="number" class="sl" min="0" value="0"></td>
                <td class="tt">0</td>
            </tr>

            <tr>
                <td>Sữa</td>
                <td class="gia">15000</td>
                <td><input type="number" class="sl" min="0" value="0"></td>
                <td class="tt">0</td>
            </tr>

            <tr>
                <td>Nước ngọt</td>
                <td class="gia">12000</td>
                <td><input type="number" class="sl" min="0" value="0"></td>
                <td class="tt">0</td>
            </tr>
            <tr>
                <td>Thịt Bò</td>
                <td class="gia">170000</td>
                <td><input type="number" class="sl" min="0" value="0"></td>
                <td class="tt">0</td>
            </tr>
        </table>

        <br>

        <button onclick="tinhTien()">Tính Tiền</button>

        <h3>Tổng thanh toán: <span id="tong">0</span> đ</h3>
    </div>

    <script>
        function tinhTien() {

            const gia = document.getElementsByClassName("gia");
            const sl = document.getElementsByClassName("sl");
            const tt = document.getElementsByClassName("tt");

            let tong = 0;

            for(let i = 0; i < gia.length; i++) {

                let donGia = parseInt(gia[i].innerHTML);
                let soLuong = parseInt(sl[i].value);

                let thanhTien = donGia * soLuong;

                tt[i].innerHTML = thanhTien.toLocaleString('vi-VN');

                tong += thanhTien;
            }

            document.getElementById("tong").innerHTML =
            tong.toLocaleString('vi-VN');
        }
    </script>

</body>
</html>
