<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hóa Đơn Thanh Toán</title>
    <link rel="stylesheet" href="../css/style4.css">
</head>
<body>

<div class="container">

    <div class="invoice-card">

        <h1>🧾 HÓA ĐƠN THANH TOÁN</h1>
        <p class="subtitle">Danh sách sản phẩm cần thanh toán</p>

        <table>
            <thead>
                <tr>
                    <th>Sản phẩm</th>
                    <th>Đơn giá</th>
                    <th>Số lượng</th>
                    <th>Thành tiền</th>
                </tr>
            </thead>

            <tbody>
                <tr>
                    <td>Bánh</td>
                    <td class="gia">10000</td>
                    <td><input type="number" class="sl" value="0" min="0"></td>
                    <td class="tt">0</td>
                </tr>

                <tr>
                    <td>Sữa</td>
                    <td class="gia">15000</td>
                    <td><input type="number" class="sl" value="0" min="0"></td>
                    <td class="tt">0</td>
                </tr>

                <tr>
                    <td>Nước ngọt</td>
                    <td class="gia">12000</td>
                    <td><input type="number" class="sl" value="0" min="0"></td>
                    <td class="tt">0</td>
                </tr>

                <tr>
                    <td>Thịt bò</td>
                    <td class="gia">170000</td>
                    <td><input type="number" class="sl" value="0" min="0"></td>
                    <td class="tt">0</td>
                </tr>
            </tbody>
        </table>

        <button onclick="tinhTien()">Tính Tiền</button>

        <div class="total-box">
            Tổng thanh toán:
            <span id="tong">0</span> đ
        </div>

    </div>

</div>

<script>
function tinhTien() {

    const gia = document.getElementsByClassName("gia");
    const sl = document.getElementsByClassName("sl");
    const tt = document.getElementsByClassName("tt");

    let tong = 0;

    for(let i = 0; i < gia.length; i++) {

        let donGia = parseInt(gia[i].innerHTML);
        let soLuong = parseInt(sl[i].value);

        let thanhTien = donGia * soLuong;

        tt[i].innerHTML =
            thanhTien.toLocaleString('vi-VN');

        tong += thanhTien;
    }

    document.getElementById("tong").innerHTML =
        tong.toLocaleString('vi-VN');
}
</script>

</body>
</html>
