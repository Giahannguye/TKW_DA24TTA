<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>

    <h1>BẢNG CỬU CHƯƠNG </h1>
    <p class="guide-text">Chọn một số bất kỳ bên dưới để học và xem các phép tính:</p>

    <div class="menu-buttons">
        <button class="btn" onclick="inBangCuuChuong(1)">Bảng 1</button>
        <button class="btn" onclick="inBangCuuChuong(2)">Bảng 2</button>
        <button class="btn" onclick="inBangCuuChuong(3)">Bảng 3</button>
        <button class="btn" onclick="inBangCuuChuong(4)">Bảng 4</button>
        <button class="btn" onclick="inBangCuuChuong(5)">Bảng 5</button>
        <button class="btn" onclick="inBangCuuChuong(6)">Bảng 6</button>
        <button class="btn" onclick="inBangCuuChuong(7)">Bảng 7</button>
        <button class="btn" onclick="inBangCuuChuong(8)">Bảng 8</button>
        <button class="btn" onclick="inBangCuuChuong(9)">Bảng 9</button>
        <button class="btn" onclick="inBangCuuChuong(10)">Bảng 10</button>
    </div>

    <div class="table-container">
        <div id="tieude" class="table-title">Bảng Cửu Chương 1</div>
        <div id="khung-chua-so">
            </div>
    </div>

    <script>
        function inBangCuuChuong(so) {
            document.getElementById('tieude').innerText = "Bảng Cửu Chương " + so;
            
            let danhSachPhepTinh = "";
            for (let i = 1; i <= 10; i++) {
                let ketQua = so * i;
                danhSachPhepTinh += "<div class='dong-tinh'>" + so + " x " + i + " = " + ketQua + "</div>";
            }
            
            document.getElementById('khung-chua-so').innerHTML = danhSachPhepTinh;
        }

        inBangCuuChuong(1);
    </script>

</body>
</html>
