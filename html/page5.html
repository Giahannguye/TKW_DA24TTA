<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>

    <div class="container">
        <h1> BẢNG CỬU CHƯƠNG </h1>

        <label for="tableSelect">
            Chọn bảng cửu chương muốn học:
        </label>

        <select id="tableSelect" onchange="showTable()">
            <option value="">-- Chọn bảng nhân --</option>
            <option value="2">Bảng nhân 2</option>
            <option value="3">Bảng nhân 3</option>
            <option value="4">Bảng nhân 4</option>
            <option value="5">Bảng nhân 5</option>
            <option value="6">Bảng nhân 6</option>
            <option value="7">Bảng nhân 7</option>
            <option value="8">Bảng nhân 8</option>
            <option value="9">Bảng nhân 9</option>
            <option value="10">Bảng nhân 10</option>
        </select>

        <div id="result" class="result">
            Hãy chọn một bảng nhân nhé!
        </div>
    </div>

    <script>
        function showTable() {
            let number = document.getElementById("tableSelect").value;

            if(number === "") {
                document.getElementById("result").innerHTML =
                "Hãy chọn một bảng nhân nhé!";
                return;
            }

            let text = `<h2>Bảng nhân ${number}</h2>`;

            for(let i = 1; i <= 10; i++) {
                text += `${number} × ${i} = ${number * i}<br>`;
            }

            document.getElementById("result").innerHTML = text;
        }
    </script>

</body>
</html>
