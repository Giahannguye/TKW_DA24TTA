<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title> Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>

<body>

<h1> Bảng Cửu Chương</h1>
<p class="sub">Chọn một chương để mở ra học nha ><</p>

<div class="menu" id="menu"></div>

<div class="card">
    <h2 id="title">Chưa mở bảng cửu chương</h2>
    <div id="content"></div>
</div>

<script>
    const menu = document.getElementById("menu");

    for (let i = 1; i <= 10; i++) {
        let btn = document.createElement("button");
        btn.className = "btn";
        btn.innerHTML = " Chương " + i;

        btn.onclick = () => openGift(i, btn);
        menu.appendChild(btn);
    }

    function openGift(n, btn) {
        document.getElementById("title").innerText = " Bạn nhận được bảng " + n + "!";

        let html = "";

        for (let i = 1; i <= 10; i++) {
            html += `<div class="line"> ${n} × ${i} = <b>${n * i}</b></div>`;
        }

        const content = document.getElementById("content");

        content.classList.remove("show");
        void content.offsetWidth;
        content.classList.add("show");

        content.innerHTML = html;

        // đổi trạng thái nút
        document.querySelectorAll(".btn").forEach((b, index) => {
            if (index + 1 === n) {
                b.innerHTML = " Đã mở chương " + n;
                b.classList.add("active");
            }
        });
    }
</script>

</body>
</html>
