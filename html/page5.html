<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>

<body>

<div class="candy-wrapper">
    <h1 class="candy-title">Bảng Cửu Chương </h1>
    <p class="candy-subtitle">Nhấp vào các chương để mở bài </p>

    <div class="candy-menu" id="menu"></div>

    <div class="candy-card">
        <h2 id="title"> Các chương đang đóng... Chọn một chương để mở  </h2>
        <div id="content" class="candy-content"></div>
    </div>
</div>

<script>
    const menu = document.getElementById("menu");

    for (let i = 1; i <= 10; i++) {
        let btn = document.createElement("button");
        btn.className = "kẹo kẹo-" + i;
        btn.innerHTML = " Chương " + i;

        btn.onclick = () => openTable(i, btn);
        menu.appendChild(btn);
    }

    function openTable(n, btn) {
        document.getElementById("title").innerText = " Bạn đang học bảng nhân " + n + " >< ";

        let html = "";

        for (let i = 1; i <= 10; i++) {
            html += '<div class="sticker-line">' + n + ' × ' + i + ' = <b class="candy-result">' + (n * i) + '</b></div>';
        }

        const content = document.getElementById("content");

        content.classList.remove("pop");
        void content.offsetWidth; 
        content.classList.add("pop");

        content.innerHTML = html;

        document.querySelectorAll(".kẹo").forEach((b, index) => {
            b.classList.remove("active");
            b.innerHTML = " Chương  " + (index + 1);
        });

        btn.innerHTML = " Đang Học Chương " + n;
        btn.classList.add("active");
    }
</script>

</body>
</html>
