<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Bảng Cửu Chương</title>
    <link rel="stylesheet" href="../css/style5.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1> Bảng Cửu Chương</h1>
        <p>Chọn bảng cửu chương mà bạn muốn học</p>
    </div>

    <div class="table-list" id="menu"></div>

    <div class="result-card">
        <h2 id="title"> Chọn một bảng nhân để bắt đầu</h2>
        <div id="content" class="result-content"></div>
    </div>

</div>

<script>

const menu = document.getElementById("menu");

for(let i=1;i<=10;i++){

    let card = document.createElement("div");
    card.className = "table-card";

    card.innerHTML = `
        <span class="number">${i}</span>
        <h3>Bảng Nhân ${i}</h3>
    `;

    card.onclick = () => openTable(i, card);

    menu.appendChild(card);
}

function openTable(n, card){

    document.getElementById("title").innerHTML =
        " Bảng Nhân " + n;

    let html = "";

    for(let i=1;i<=10;i++){

        html += `
        <div class="line">
            ${n} × ${i} = <strong>${n*i}</strong>
        </div>
        `;
    }

    document.getElementById("content").innerHTML = html;

    document.querySelectorAll(".table-card")
    .forEach(item => item.classList.remove("active"));

    card.classList.add("active");
}

</script>

</body>
</html>
