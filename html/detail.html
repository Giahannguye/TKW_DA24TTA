<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="../css/detail.css">
</head>
<body>

<div class="detail-box" id="detail"></div>

<script>
function getData(){
    const params = new URLSearchParams(window.location.search);
    return JSON.parse(params.get("data"));
}

const product = getData();

document.getElementById("detail").innerHTML = `
    <img src="${product.img}" alt="${product.name}">

    <h1>${product.name}</h1>

    <p class="price"> Giá: ${product.price}</p>
    <p class="status"> Tình trạng: ${product.status}</p>

    <p class="desc">
        Đây là sản phẩm gấu bông chất lượng cao, mềm mại, thích hợp làm quà tặng cho bạn bè và người thân ^^
    </p>

    <div class="buttons">
        <a href="page7.html" class="back">⬅ Quay lại</a>
        <button class="buy"> Mua ngay</button>
    </div>
`;
</script>

</body>
</html>
