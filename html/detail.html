<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết sản phẩm</title>
    <link rel="stylesheet" href="style-detail.css">
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-link">← Quay lại cửa hàng</a>
        
        <div class="product-detail-container">
            <!-- Bên trái: Ảnh -->
            <div class="detail-image">
                <img id="detail-img" src="" alt="">
            </div>

            <!-- Bên phải: Nội dung -->
            <div class="detail-info">
                <h1 id="detail-name">Tên sản phẩm</h1>
                <p class="detail-price" id="detail-price">0đ</p>
                <p class="detail-status">Tình trạng: <span id="detail-status">...</span></p>
                
                <div class="description">
                    <h3>Mô tả chi tiết:</h3>
                    <p>Sản phẩm gấu bông cao cấp, chất liệu bông xoắn 3 chiều cực mềm mại, an toàn cho da tay. Thích hợp làm quà tặng cho người yêu hoặc trẻ em.</p>
                </div>

                <button class="buy-btn">Thêm vào giỏ hàng</button>
            </div>
        </div>
    </div>

    <script src="script-detail.js"></script>
</body>
</html>
