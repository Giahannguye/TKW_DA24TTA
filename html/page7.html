<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Shop Gấu Bông</title>
    <link rel="stylesheet" href="../css/style7.css">
</head>

<body>

<h1 class="title"> SHOP GẤU BÔNG </h1>

<div id="product-list" class="product-grid"></div>

<script>
const productList = [
    { name: "Gấu Bông Kitty", price: "210.000 VNĐ", status: "Đang về hàng", img: "../assets/images/2.jpg" },
    { name: "Gấu Bông Cá Mập", price: "120.000 VNĐ", status: "Còn khoảng 300 con", img: "../assets/images/3.jpg" },
    { name: "Thỏ Bông Teddy", price: "370.000 VNĐ", status: "Hết hàng", img: "../assets/images/4.jpg" },
    { name: "Mèo Bông Dinga", price: "260.000 VNĐ", status: "Số lượng ít", img: "../assets/images/5.jpg" },
    { name: "Chó Shiba Bông", price: "310.000 VNĐ", status: "Còn 20 con", img: "../assets/images/6.jpg" }
];

function addProduct(item){

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
        <img src="${item.img}" alt="${item.name}">
        <h3>${item.name}</h3>
        <p class="price"> ${item.price}</p>
        <p class="status"> ${item.status}</p>

        <a class="btn"
           href="detail.html?data=${encodeURIComponent(JSON.stringify(item))}">
           Xem chi tiết
        </a>
    `;

    document.getElementById("product-list").appendChild(card);
}

productList.forEach(addProduct);
</script>

</body>
</html>
