<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đóng Tiền Học Phí</title>
    <link rel="stylesheet" href="../css/style6.css">
</head>
<body>

<div class="container">

    <h1> PHIẾU ĐÓNG HỌC PHÍ</h1>

    <div class="form">
        <input type="text" id="ten" placeholder="Nhập họ tên">
        <input type="number" id="stc" placeholder="Nhập số tín chỉ">
        <button onclick="taoPhieu()">Tạo phiếu</button>
    </div>

    <div class="bill">

        <p><b>Họ tên:</b> <span id="kqTen">---</span></p>
        <p><b>Số tín chỉ:</b> <span id="kqStc">---</span></p>
        <p><b>Học phí:</b> <span id="kqTien">---</span></p>

        <p class="status">
            Trạng thái: <span id="kqTrangThai">---</span>
        </p>

    </div>

</div>

<script>
function taoPhieu(){

    let ten = document.getElementById("ten").value;
    let stc = parseInt(document.getElementById("stc").value);

    if(ten === "" || isNaN(stc)){
        alert("Vui lòng nhập đầy đủ!");
        return;
    }

    let hocphi = stc * 500000;

    document.getElementById("kqTen").innerText = ten;
    document.getElementById("kqStc").innerText = stc;
    document.getElementById("kqTien").innerText =
        hocphi.toLocaleString() + " VNĐ";

    // tự động trạng thái
    document.getElementById("kqTrangThai").innerText = "ĐÃ ĐÓNG";
    document.getElementById("kqTrangThai").style.color = "green";
}
</script>

</body>
</html>
